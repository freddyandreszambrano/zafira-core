name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    env:
      DJANGO_SETTINGS_MODULE: config.settings
      SECRET_KEY: ci-secret-key-not-for-production
      DEBUG: "False"
      ALLOWED_HOSTS: "*"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements/*.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/dev.txt

      - name: Check migrations are up-to-date
        run: python manage.py makemigrations --check --dry-run

      - name: Run migrations
        run: python manage.py migrate

      - name: Django system check
        run: python manage.py check --deploy --fail-level WARNING || true

      - name: Run tests
        run: python manage.py test core.common core.security core.auth core.profiles --verbosity=2

      - name: Black (check)
        run: black --check core/ config/

      - name: isort (check)
        run: isort --check-only core/ config/

      - name: Flake8
        run: flake8 core/ config/ --max-line-length=100 --extend-ignore=E203,W503

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: zafira-core:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
