services:
  db:
    image: postgres:16-alpine
    container_name: zafira_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zafira}
      POSTGRES_USER: ${POSTGRES_USER:-zafira}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zafira}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zafira}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    container_name: zafira_web
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-zafira}:${POSTGRES_PASSWORD:-zafira}@db:5432/${POSTGRES_DB:-zafira}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: >
      sh -c "python manage.py migrate &&
             python manage.py insert_data &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --access-logfile - --error-logfile -"
    volumes:
      - staticfiles:/app/staticfiles
      - media:/app/media

volumes:
  pgdata:
  staticfiles:
  media:
