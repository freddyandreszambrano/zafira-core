databases:
  - name: zafira-core-db
    plan: free
    databaseName: zafira
    user: zafira

services:
  - type: web
    name: zafira-core
    runtime: docker
    plan: free
    branch: develop
    dockerfilePath: ./deploy/docker-service-zafira/Dockerfile
    healthCheckPath: /health
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: PSQL
        value: "1"
      - key: DATABASE_URL
        fromDatabase:
          name: zafira-core-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: SECURE_SSL_REDIRECT
        value: "True"
      - key: SESSION_COOKIE_SECURE
        value: "True"
      - key: CSRF_COOKIE_SECURE
        value: "True"
      - key: TRYON_USE_CELERY
        value: "False"
      - key: STORAGE_ENDPOINT_URL
        sync: false
      - key: STORAGE_ACCESS_KEY
        sync: false
      - key: STORAGE_SECRET_KEY
        sync: false
      - key: STORAGE_BUCKET
        sync: false
      - key: STORAGE_REGION
        value: auto
      - key: ZAFIRA_IA_BASE_URL
        sync: false
      - key: SITE_URL
        sync: false
