<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ZAFIRA - Sistema Administrativo{% endblock %}</title>

    <script>
        (function () {
            const saved = localStorage.getItem('zafira-theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (saved === 'dark' || (!saved && prefersDark)) document.documentElement.classList.add('dark');
        })();
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        zafira: {
                            primary: '#FF3BBE',
                            'primary-soft': '#FFE5F6',
                            'primary-mid': '#FFB6E2',
                            secondary: '#8E54FF',
                            'secondary-soft': '#EFE7FF',
                            'secondary-mid': '#C2A8FF',
                            obsidian: '#090101',
                            'obsidian-soft': '#1F1F23',
                            slate: '#94A3BB',
                            'slate-soft': '#E2E8F0',
                            'slate-deep': '#475569',
                        },
                    },
                    boxShadow: {
                        'zafira': '0 10px 30px -10px rgba(255, 59, 190, 0.35)',
                        'zafira-lg': '0 20px 45px -15px rgba(255, 59, 190, 0.45)',
                    },
                },
            },
        }
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --z-bg: #f8fafc;
            --z-surface: #ffffff;
            --z-text: #0f172a;
            --z-text-soft: #475569;
            --z-text-mute: #94A3BB;
            --z-border: #f1f5f9;
        }
        html.dark {
            --z-bg: #0b0b12;
            --z-surface: #15151c;
            --z-text: #e2e8f0;
            --z-text-soft: #cbd5e1;
            --z-text-mute: #64748b;
            --z-border: #262630;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--z-bg);
            color: var(--z-text);
        }

        .gradient-primary { background: linear-gradient(135deg, #FF3BBE 0%, #8E54FF 100%); }
        .gradient-dark    { background: linear-gradient(135deg, #090101 0%, #1F1F23 100%); }

        .zafira-text-gradient {
            background: linear-gradient(135deg, #FF3BBE 0%, #8E54FF 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            -webkit-text-fill-color: transparent;
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>
<body>
    {% if messages %}
    <div class="fixed top-4 right-4 z-50 max-w-md">
        {% for message in messages %}
        <div class="bg-zafira-primary-soft border-l-4 border-zafira-primary text-zafira-obsidian dark:bg-zafira-primary/20 dark:text-white p-4 mb-2 rounded shadow-lg">
            <i class="fas fa-check-circle mr-2 text-zafira-primary"></i>{{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}

    {% block content %}{% endblock %}

    {% block extra_js %}{% endblock %}
</body>
</html>
