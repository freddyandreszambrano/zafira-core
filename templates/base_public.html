{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>{% block title %}ZAFIRA - Sistema Administrativo{% endblock %}</title>

    <link rel="icon" type="image/svg+xml" href="{% static 'img/favicon-gem.svg' %}">
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'img/favicon-32.png' %}">
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'img/favicon-180.png' %}">

    <script>
        (function () {
            const saved = localStorage.getItem('zafira-theme');
            const meta = document.querySelector('meta[name="color-scheme"]');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (saved === 'dark' || (!saved && prefersDark)) document.documentElement.classList.add('dark');
            if (saved && meta) meta.content = saved;
        })();
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        zafira: {
                            primary: '#FF3BBE',
                            'primary-soft': '#FFE5F6',
                            'primary-mid': '#FFB6E2',
                            secondary: '#8E54FF',
                            'secondary-soft': '#EFE7FF',
                            'secondary-mid': '#C2A8FF',
                            obsidian: '#090101',
                            'obsidian-soft': '#1F1F23',
                            slate: '#94A3BB',
                            'slate-soft': '#E2E8F0',
                            'slate-deep': '#475569',
                        },
                    },
                    boxShadow: {
                        'zafira': '0 10px 30px -10px rgba(255, 59, 190, 0.35)',
                        'zafira-lg': '0 20px 45px -15px rgba(255, 59, 190, 0.45)',
                    },
                },
            },
        }
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'auth/css/public.css' %}">

    <style>
        :root {
            color-scheme: light dark;
            --z-bg: #f6f8fb;
            --z-surface: #ffffff;
            --z-text: #0f172a;
            --z-text-soft: #475569;
            --z-text-mute: #64748b;
            --z-border: #e2e8f0;
            --z-primary: #e617a6;
            --z-focus: rgba(230, 23, 166, .22);
            accent-color: var(--z-primary);
        }
        html.dark {
            color-scheme: dark;
            --z-bg: #0b1020;
            --z-surface: #111827;
            --z-text: #f8fafc;
            --z-text-soft: #cbd5e1;
            --z-text-mute: #94a3b8;
            --z-border: #2b3548;
            --z-primary: #ff6acb;
            --z-focus: rgba(255, 106, 203, .24);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--z-bg);
            color: var(--z-text);
        }
        :where(a, button, input, select, textarea, [tabindex]):focus-visible {
            outline: 3px solid var(--z-focus);
            outline-offset: 2px;
        }

        .gradient-primary { background: linear-gradient(135deg, #FF3BBE 0%, #8E54FF 100%); }
        .gradient-dark    { background: radial-gradient(circle at top left, rgba(255, 59, 190, .22), transparent 32%), linear-gradient(135deg, #0b1020 0%, #151827 100%); }

        .zafira-text-gradient {
            background: linear-gradient(135deg, #FF3BBE 0%, #8E54FF 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            -webkit-text-fill-color: transparent;
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>
<body>
    {% if messages %}
    <div class="fixed top-4 right-4 z-50 max-w-md">
        {% for message in messages %}
        <div class="bg-zafira-primary-soft border-l-4 border-zafira-primary text-zafira-obsidian dark:bg-zafira-primary/20 dark:text-white p-4 mb-2 rounded shadow-lg">
            <i class="fas fa-check-circle mr-2 text-zafira-primary"></i>{{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <button type="button" class="auth-theme-toggle" data-theme-toggle aria-label="Cambiar tema">
        <i class="fas fa-moon icon-moon"></i>
        <i class="fas fa-sun icon-sun"></i>
    </button>

    {% block content %}{% endblock %}

    <script src="{% static 'auth/js/public.js' %}" defer></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
