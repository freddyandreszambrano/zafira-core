{% extends 'base.html' %}

{% block title %}Eliminar - ZAFIRA{% endblock %}

{% block content %}
<div class="min-h-screen bg-gradient-to-br from-white via-zafira-primary-soft/30 to-zafira-secondary-soft/30 dark:from-zafira-obsidian dark:via-zafira-obsidian-soft dark:to-zafira-obsidian py-10">
    <div class="max-w-md mx-auto px-4 sm:px-6 lg:px-8">
        <div class="bg-white dark:bg-zafira-obsidian-soft rounded-2xl shadow-md p-8 text-center">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-zafira-primary-soft dark:bg-zafira-primary/20 mb-4">
                <i class="fas fa-exclamation-triangle text-zafira-primary text-2xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-zafira-obsidian dark:text-zafira-slate-soft mb-2">¿Eliminar registro?</h1>
            <p class="text-zafira-slate-deep dark:text-zafira-slate mb-6">
                Esta acción no se puede deshacer.
            </p>

            <form method="post" id="frmDelete" class="flex justify-center gap-3">
                {% csrf_token %}
                {% if list_url %}
                    <a href="{{ list_url }}" class="bg-white dark:bg-zafira-obsidian border border-zafira-slate-soft dark:border-zafira-obsidian text-zafira-slate-deep dark:text-zafira-slate-soft font-semibold px-5 py-2.5 rounded-xl hover:bg-zafira-slate-soft/40 dark:hover:bg-zafira-obsidian-soft transition">
                        Cancelar
                    </a>
                {% endif %}
                <button type="submit" class="bg-zafira-primary text-white font-bold px-6 py-2.5 rounded-xl hover:opacity-90 inline-flex items-center transition">
                    <i class="fas fa-trash mr-2"></i>Eliminar
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.getElementById('frmDelete').addEventListener('submit', function (e) {
        e.preventDefault();
        const form = e.target;
        const formData = new FormData(form);
        fetch(pathname, {
            method: 'POST',
            headers: { 'X-CSRFToken': csrftoken },
            body: formData,
        })
            .then(r => r.json())
            .then(data => {
                if (data.error) {
                    alert(data.error);
                } else {
                    window.location.href = '{{ list_url }}';
                }
            });
    });
</script>
{% block head_delete %}{% endblock %}
{% endblock %}
