{% extends 'list.html' %}

{% block columns %}
    <th>Nombre</th>
    <th>Icono</th>
    <th class="text-center">Orden</th>
    <th class="text-center">Estado</th>
    <th class="text-center">Acciones</th>
{% endblock %}

{% block javascript_list %}
<script>
    $(function () {
        Zafira.dataTable('#data', [
            { data: 'name' },
            {
                data: 'icon',
                render: data => data
                    ? `<span class="inline-flex items-center justify-center w-8 h-8 rounded-lg gradient-soft"><i class="${data} text-zafira-primary"></i></span>`
                    : '<span class="text-zafira-slate">—</span>',
            },
            {
                data: 'order',
                className: 'text-center',
                render: data => `<span class="font-semibold text-zafira-slate-deep">${data}</span>`,
            },
            {
                data: 'is_active',
                className: 'text-center',
                render: data => Zafira.statusBadge(data),
            },
            {
                data: 'id',
                className: 'text-center',
                orderable: false,
                render: id => Zafira.rowActions(id),
            },
        ], { toggleConfirm: '¿Cambiar el estado de este tipo de módulo?' });
    });
</script>
{% endblock %}
