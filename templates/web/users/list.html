{% extends "base.html" %}
{% block title %}Gestión de Usuarios - ZAFIRA{% endblock %}
{% block content %}
<div class="min-h-screen bg-gradient-to-br from-gray-50 to-gray-100 py-12">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        
        <!-- Header -->
        <div class="mb-8 flex justify-between items-center">
            <div>
                <h1 class="text-4xl font-bold text-gray-900 mb-2">
                    <i class="fas fa-user-shield text-purple-600 mr-3"></i>Gestión de Usuarios
                </h1>
                <p class="text-gray-600">Administra y controla todos los usuarios del sistema</p>
            </div>
            <a href="{% url 'register' %}" class="gradient-primary text-white font-bold px-6 py-3 rounded-lg hover:shadow-lg transition flex items-center">
                <i class="fas fa-user-plus mr-2"></i>Nuevo Usuario
            </a>
        </div>

        <!-- Search Box -->
        <div class="mb-6">
            <div class="relative">
                <i class="fas fa-search absolute left-4 top-3.5 text-gray-400"></i>
                <input type="text" id="searchInput" placeholder="Buscar por nombre, email, usuario o DNI..." 
                       class="w-full pl-12 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent outline-none shadow-sm">
            </div>
        </div>

        <!-- Users Table -->
        <div class="bg-white rounded-xl shadow-md overflow-hidden">
            <div class="px-6 py-4 bg-gradient-to-r from-purple-600 to-purple-700">
                <h2 class="text-xl font-bold text-white flex items-center">
                    <i class="fas fa-list mr-3"></i>Lista de Usuarios
                </h2>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full" id="usersTable">
                    <thead class="bg-gray-50 border-b">
                        <tr>
                            <th class="px-6 py-3 text-left text-sm font-semibold text-gray-700">Usuario</th>
                            <th class="px-6 py-3 text-left text-sm font-semibold text-gray-700">Email</th>
                            <th class="px-6 py-3 text-left text-sm font-semibold text-gray-700">Nombre Completo</th>
                            <th class="px-6 py-3 text-left text-sm font-semibold text-gray-700">Estado</th>
                            <th class="px-6 py-3 text-left text-sm font-semibold text-gray-700">Acciones</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y" id="usersBody">
                        <tr>
                            <td colspan="5" class="px-6 py-8 text-center text-gray-500">
                                <i class="fas fa-spinner-third animate-spin text-2xl"></i><br>Cargando usuarios...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
let currentPage = 1;

document.addEventListener('DOMContentLoaded', function() {
    loadUsers();
    document.getElementById('searchInput').addEventListener('input', function() {
        currentPage = 1;
        loadUsers();
    });
});

function loadUsers() {
    const search = document.getElementById('searchInput').value;
    const url = `/api/users/list/?page=${currentPage}&search=${search}`;
    
    fetch(url)
        .then(response => response.json())
        .then(data => {
            const tbody = document.getElementById('usersBody');
            if (data.users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="px-6 py-8 text-center text-gray-500"><i class="fas fa-inbox text-2xl mb-2"></i><br>No se encontraron usuarios</td></tr>';
                return;
            }
            
            tbody.innerHTML = data.users.map(user => `
                <tr class="hover:bg-gray-50 transition">
                    <td class="px-6 py-4 text-sm font-medium text-gray-900">${user.username}</td>
                    <td class="px-6 py-4 text-sm text-gray-600">${user.email}</td>
                    <td class="px-6 py-4 text-sm text-gray-900">${user.full_name}</td>
                    <td class="px-6 py-4">
                        <span class="px-3 py-1 text-xs font-semibold rounded-full ${user.is_active ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}">
                            ${user.is_active ? '<i class="fas fa-check-circle mr-1"></i>Activo' : '<i class="fas fa-times-circle mr-1"></i>Inactivo'}
                        </span>
                    </td>
                    <td class="px-6 py-4 text-sm font-medium space-x-3">
                        <button onclick="editUser(${user.id}, '${user.username}', '${user.email}', ${user.is_active})" class="text-blue-600 hover:text-blue-900 font-semibold">
                            <i class="fas fa-edit mr-1"></i>Editar
                        </button>
                        <button onclick="deleteUser(${user.id})" class="text-red-600 hover:text-red-900 font-semibold">
                            <i class="fas fa-trash mr-1"></i>Eliminar
                        </button>
                    </td>
                </tr>
            `).join('');
        })
        .catch(error => console.error('Error:', error));
}

function editUser(userId, username, email, isActive) {
    const newUsername = prompt('Nuevo usuario:', username);
    if (newUsername === null) return;
    
    const newEmail = prompt('Nuevo email:', email);
    if (newEmail === null) return;
    
    const formData = new FormData();
    formData.append('user_id', userId);
    formData.append('username', newUsername);
    formData.append('email', newEmail);
    formData.append('is_active', document.querySelector('[name=csrfmiddlewaretoken]') ? 'on' : '');
    formData.append('csrfmiddlewaretoken', document.querySelector('[name=csrfmiddlewaretoken]')?.value || '{{ csrf_token }}');
    
    fetch('/api/users/edit/', { method: 'POST', body: formData })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                alert('Usuario actualizado exitosamente');
                loadUsers();
            } else {
                alert('Error: ' + (data.errors || 'Error desconocido'));
            }
        });
}

function deleteUser(userId) {
    if (!confirm('¿Estás seguro de que deseas eliminar este usuario?')) return;
    
    const formData = new FormData();
    formData.append('user_id', userId);
    formData.append('csrfmiddlewaretoken', document.querySelector('[name=csrfmiddlewaretoken]')?.value || '{{ csrf_token }}');
    
    fetch('/api/users/delete/', { method: 'POST', body: formData })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                alert(data.message);
                loadUsers();
            } else {
                alert('Error: ' + (data.error || 'Error desconocido'));
            }
        });
}
</script>
{% endblock %}
